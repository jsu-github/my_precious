services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: precious
      POSTGRES_PASSWORD: precious
      POSTGRES_DB: precious
    volumes:
      - ./data/db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U precious -d precious"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ./api
    ports:
      - "4001:3001"
    environment:
      DATABASE_URL: postgres://precious:precious@db:5432/precious
      NODE_ENV: development
    volumes:
      - ./api/src:/app/src
      - ./api/migrations:/app/migrations
      - ./api/tsconfig.json:/app/tsconfig.json
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "4000:3000"
    environment:
      VITE_API_URL: http://api:3001
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
      - ./frontend/tailwind.config.ts:/app/tailwind.config.ts
    depends_on:
      - api
